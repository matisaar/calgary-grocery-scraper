<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Calgary Grocery Price Compare{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        /* NAV */
        nav {
            background: linear-gradient(135deg, #1a5632, #2d8b4e);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
        }
        nav .logo span { color: #ffd700; }
        nav .nav-links { display: flex; gap: 1.5rem; }
        nav .nav-links a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        nav .nav-links a:hover { color: #ffd700; }
        
        /* MAIN */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* SEARCH BAR */
        .search-box {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }
        .search-box form {
            display: flex;
            gap: 0.75rem;
        }
        .search-box input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input[type="text"]:focus {
            border-color: #2d8b4e;
        }
        .search-box button, .btn {
            padding: 0.75rem 1.5rem;
            background: #2d8b4e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .search-box button:hover, .btn:hover {
            background: #1a5632;
        }
        .btn-outline {
            background: transparent;
            color: #2d8b4e;
            border: 2px solid #2d8b4e;
        }
        .btn-outline:hover {
            background: #2d8b4e;
            color: white;
        }
        
        /* FILTERS */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filters select {
            padding: 0.5rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
        }
        
        /* CARDS */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background: #fafafa;
            padding: 1rem;
        }
        .card-body {
            padding: 1rem;
        }
        .card-body h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
            line-height: 1.3;
        }
        .card-body .brand {
            color: #777;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        .card-body .size {
            color: #999;
            font-size: 0.8rem;
        }
        .card-price {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .price-current {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a5632;
        }
        .price-was {
            font-size: 0.9rem;
            color: #999;
            text-decoration: line-through;
        }
        .sale-badge {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .store-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
        }
        .store-walmart { background: #0071dc; }
        .store-superstore { background: #e31837; }
        .store-saveonfoods { background: #ee2e24; }
        .store-nofrills { background: #fdd017; color: #333; }
        .store-safeway { background: #c8102e; }
        
        /* COMPARISON TABLE */
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 1.5rem;
        }
        .compare-table th {
            background: #f8f8f8;
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e0e0e0;
        }
        .compare-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .compare-table tr:hover { background: #f9fdf9; }
        .cheapest { background: #e8f5e9 !important; font-weight: 600; }
        
        /* STATS */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.25rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #1a5632;
        }
        .stat-card .stat-label {
            color: #777;
            font-size: 0.9rem;
        }
        
        /* CATEGORY PILLS */
        .category-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .category-pill {
            padding: 0.4rem 1rem;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            text-decoration: none;
            color: #555;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .category-pill:hover, .category-pill.active {
            background: #2d8b4e;
            color: white;
            border-color: #2d8b4e;
        }
        
        /* SECTION HEADINGS */
        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #222;
        }
        
        /* FOOTER */
        footer {
            text-align: center;
            padding: 2rem;
            color: #999;
            font-size: 0.85rem;
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 1rem; }
            .search-box form { flex-direction: column; }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">🛒 Calgary <span>Grocery Compare</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/search">Search</a>
            <a href="/stats">Stats</a>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <footer>
        <p>Calgary Grocery Price Compare — Built with Scrapy + Playwright + Flask</p>
        <p>Prices scraped from Walmart, Superstore, Save-On-Foods, No Frills, Safeway, Costco</p>
    </footer>
    
    {% block scripts %}{% endblock %}
</body>
</html>
